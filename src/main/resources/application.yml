server:
  port: ${PORT:5000}

spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  data:
    mongodb:
      uri: ${DB_URL}
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 500ms
      connect-timeout: 500ms

app:
  cors:
    allowed-origin: ${REACT_APP_DOMAIN}
  cookie:
    domain: ${COOKIE_DOMAIN:}
  jwt:
    access-secret: ${ACCESS_TOKEN_SECRET}
    refresh-secret: ${REFRESH_TOKEN_SECRET}
    access-expiry-minutes: 15
    refresh-expiry-days: 7
  cache:
    # NOTE: the original .env defines CACHE_EXPIRATION but the controllers read
    # process.env.CACHE_EXPIRY (never actually set) -> they silently always fell back
    # to the hardcoded 300s default. Wiring this to CACHE_EXPIRATION here on purpose,
    # since that was almost certainly the intent. Flag if you want the old (buggy) behavior instead.
    expiry-seconds: ${CACHE_EXPIRATION:300}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

logging:
  level:
    com.flicklog: INFO
