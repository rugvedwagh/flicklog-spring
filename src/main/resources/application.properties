spring.application.name=flicklog-server

# Locally defaults to "dev". On Render, set SPRING_PROFILES_ACTIVE=prod.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:5000}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

app.jwt.access-secret=${ACCESS_TOKEN_SECRET}
app.jwt.refresh-secret=${REFRESH_TOKEN_SECRET}
app.jwt.access-expiry-minutes=15
app.jwt.refresh-expiry-days=7

app.cookie.domain=${COOKIE_DOMAIN:}
app.cookie.secure=${COOKIE_SECURE:true}
app.cookie.same-site=${COOKIE_SAME_SITE:None}

app.cache.expiry-seconds=${CACHE_EXPIRATION:300}

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}

logging.level.com.flicklog=INFO